<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rhema Ministries Embassy — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400;1,600&family=Lato:wght@300;400;700&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --crimson: #8B1A1A;
      --gold: #B8960C;
      --gold-light: #D4AF37;
      --gold-pale: #F5E6A3;
      --black: #0D0D0D;
      --dark: #1A1410;
      --cream: #FAF6EE;
      --text: #2C2415;
      --text-light: #6B5A3A;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Lato', sans-serif;
      background: var(--dark);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 2rem 0;
      overflow-y: auto;
      overflow-x: hidden;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 70% 60% at 50% 50%, rgba(139, 26, 26, 0.15) 0%, transparent 70%),
        radial-gradient(ellipse 40% 40% at 80% 20%, rgba(184, 150, 12, 0.08) 0%, transparent 60%);
      pointer-events: none;
    }

    .bg-cross {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 800px;
      height: 800px;
      opacity: 0.025;
      pointer-events: none;
    }

    .bg-cross::before,
    .bg-cross::after {
      content: '';
      position: absolute;
      background: var(--gold-light);
      top: 50%;
      left: 50%;
    }

    .bg-cross::before {
      width: 4px;
      height: 100%;
      transform: translate(-50%, -50%);
    }

    .bg-cross::after {
      width: 100%;
      height: 4px;
      transform: translate(-50%, -50%);
    }

    .auth-container {
      width: 100%;
      max-width: 460px;
      padding: 1rem;
      margin: auto;
      z-index: 10;
      animation: fadeInUp 0.8s ease both;
    }

    .auth-header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .auth-logo {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 2px solid rgba(212, 175, 55, 0.3);
      overflow: hidden;
      margin: 0 auto 1.2rem;
      background: rgba(212, 175, 55, 0.05);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .auth-logo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .auth-title {
      font-family: 'Cinzel', serif;
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--gold-light);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 0.3rem;
    }

    .auth-sub {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 0.95rem;
      color: rgba(255, 255, 255, 0.4);
    }

    .auth-card {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(212, 175, 55, 0.18);
      padding: 2.5rem;
      backdrop-filter: blur(10px);
    }

    /* Tabs */
    .auth-tabs {
      display: flex;
      border-bottom: 1px solid rgba(212, 175, 55, 0.15);
      margin-bottom: 2rem;
    }

    .auth-tab {
      flex: 1;
      background: none;
      border: none;
      padding: 0.75rem;
      font-family: 'Cinzel', serif;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.4);
      cursor: pointer;
      transition: color 0.3s;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
    }

    .auth-tab.active {
      color: var(--gold-light);
      border-bottom-color: var(--gold-light);
    }

    /* Panels */
    .auth-panel {
      display: none;
    }

    .auth-panel.active {
      display: block;
    }

    .form-group {
      margin-bottom: 1.2rem;
    }

    .form-label {
      display: block;
      font-family: 'Cinzel', serif;
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 0.4rem;
    }

    .form-input {
      width: 100%;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(212, 175, 55, 0.2);
      padding: 0.85rem 1rem;
      font-family: 'Lato', sans-serif;
      font-size: 0.9rem;
      color: rgba(255, 255, 255, 0.85);
      outline: none;
      transition: border-color 0.3s;
    }

    .form-input::placeholder {
      color: rgba(255, 255, 255, 0.2);
    }

    .form-input:focus {
      border-color: var(--gold);
    }

    .btn-primary {
      width: 100%;
      background: var(--crimson);
      border: none;
      padding: 1rem;
      font-family: 'Cinzel', serif;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #fff;
      cursor: pointer;
      transition: background 0.3s, transform 0.2s;
      margin-top: 0.5rem;
    }

    .btn-primary:hover {
      background: var(--gold);
      color: var(--dark);
      transform: translateY(-1px);
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin: 1.5rem 0;
      color: rgba(255, 255, 255, 0.25);
      font-size: 0.75rem;
      font-family: 'Lato', sans-serif;
      letter-spacing: 0.1em;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(212, 175, 55, 0.15);
    }

    .btn-social {
      width: 100%;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(212, 175, 55, 0.2);
      padding: 0.85rem 1rem;
      font-family: 'Lato', sans-serif;
      font-size: 0.85rem;
      color: rgba(255, 255, 255, 0.7);
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      margin-bottom: 0.75rem;
    }

    .btn-social:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(212, 175, 55, 0.4);
    }

    .btn-social svg {
      width: 18px;
      height: 18px;
    }

    .forgot {
      font-size: 0.78rem;
      color: rgba(255, 255, 255, 0.35);
      text-align: right;
      display: block;
      margin-top: -0.5rem;
      margin-bottom: 1rem;
      cursor: pointer;
      transition: color 0.3s;
    }

    .forgot:hover {
      color: var(--gold-light);
    }

    /* 2FA */
    .tfa-info {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 1rem;
      color: rgba(255, 255, 255, 0.55);
      margin-bottom: 1.5rem;
      line-height: 1.7;
    }

    .tfa-code-inputs {
      display: flex;
      gap: 0.5rem;
      justify-content: center;
      margin-bottom: 1.5rem;
    }

    .tfa-digit {
      width: 48px;
      height: 56px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(212, 175, 55, 0.2);
      font-family: 'Cinzel', serif;
      font-size: 1.4rem;
      color: var(--gold-light);
      text-align: center;
      outline: none;
      transition: border-color 0.3s;
    }

    .tfa-digit:focus {
      border-color: var(--gold);
    }

    .admin-link {
      text-align: center;
      margin-top: 1.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid rgba(212, 175, 55, 0.1);
    }

    .admin-link a {
      font-family: 'Cinzel', serif;
      font-size: 0.62rem;
      letter-spacing: 0.12em;
      color: rgba(255, 255, 255, 0.3);
      text-decoration: none;
      text-transform: uppercase;
      transition: color 0.3s;
    }

    .admin-link a:hover {
      color: var(--gold);
    }

    /* Alert */
    .alert {
      padding: 0.75rem 1rem;
      margin-bottom: 1rem;
      font-size: 0.82rem;
      font-family: 'Lato', sans-serif;
      display: none;
    }

    .alert.success {
      background: rgba(42, 110, 42, 0.2);
      border: 1px solid rgba(42, 110, 42, 0.4);
      color: #7ec87e;
    }

    .alert.error {
      background: rgba(139, 26, 26, 0.25);
      border: 1px solid rgba(139, 26, 26, 0.5);
      color: #e07070;
    }

    .alert.show {
      display: block;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(24px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .check-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }

    .check-row input[type="checkbox"] {
      accent-color: var(--gold);
      width: 14px;
      height: 14px;
    }

    .check-row label {
      font-size: 0.8rem;
      color: rgba(255, 255, 255, 0.45);
    }
  </style>
</head>

<body>

  <div class="bg-cross"></div>

  <div class="auth-container">
    <div class="auth-header">
      <div class="auth-logo">
        <img src="logo.jpg" alt="RME Logo"
          onerror="this.style.display='none'; this.parentElement.innerHTML='<span style=\'font-family:Cinzel,serif;color:var(--gold-light);font-size:1.4rem;font-weight:900\'>RME</span>'">
      </div>
      <div class="auth-title">Rhema Ministries Embassy</div>
      <div class="auth-sub">Equipping The Saints For The Work Of The Ministry</div>
    </div>

    <!-- SIGN-IN PANEL -->
    <div class="auth-card" id="panel-signin" style="display:block">
      <div class="auth-tabs">
        <button class="auth-tab active" onclick="showPanel('signin')">Sign In</button>
        <button class="auth-tab" onclick="showPanel('signup')">Create Account</button>
      </div>

      <div id="alert-signin" class="alert"></div>

      <div class="form-group">
        <label class="form-label">Username or Email</label>
        <input type="text" class="form-input" id="signin-user" placeholder="Enter your username or email">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" class="form-input" id="signin-pass" placeholder="Enter your password">
      </div>
      <span class="forgot" onclick="showForgot()">Forgot password?</span>
      <div class="check-row">
        <input type="checkbox" id="remember-me">
        <label for="remember-me">Remember me on this device</label>
      </div>
      <button class="btn-primary" onclick="handleSignin()">Sign In</button>

      <div class="divider">or continue with</div>

      <button class="btn-social" onclick="socialLogin('google')">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path
            d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
            fill="#4285F4" />
          <path
            d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
            fill="#34A853" />
          <path
            d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
            fill="#FBBC05" />
          <path
            d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
            fill="#EA4335" />
        </svg>
        Continue with Google
      </button>
      <button class="btn-social" onclick="socialLogin('email')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="2" y="4" width="20" height="16" rx="2" />
          <polyline points="2,4 12,13 22,4" />
        </svg>
        Continue with Email Link
      </button>

      <div class="admin-link">
        <a href="admin.html">⚙ Administrator Access</a>
      </div>
    </div>

    <!-- SIGN-UP PANEL -->
    <div class="auth-card" id="panel-signup" style="display:none">
      <div class="auth-tabs">
        <button class="auth-tab" onclick="showPanel('signin')">Sign In</button>
        <button class="auth-tab active" onclick="showPanel('signup')">Create Account</button>
      </div>

      <div id="alert-signup" class="alert"></div>

      <div id="signup-step-1">
        <div class="form-group">
          <label class="form-label">Full Name</label>
          <input type="text" class="form-input" id="su-name" placeholder="Your full name">
        </div>
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input type="email" class="form-input" id="su-email" placeholder="your@email.com">
        </div>
        <div class="form-group">
          <label class="form-label">Username</label>
          <input type="text" class="form-input" id="su-username" placeholder="Choose a username">
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" class="form-input" id="su-pass" placeholder="Min. 8 characters">
        </div>
        <div class="form-group">
          <label class="form-label">Confirm Password</label>
          <input type="password" class="form-input" id="su-pass2" placeholder="Repeat password">
        </div>
        <div class="check-row">
          <input type="checkbox" id="su-terms">
          <label for="su-terms">I agree to the Terms of Service and Privacy Policy</label>
        </div>
        <button class="btn-primary" onclick="handleSignup()">Create Account & Verify Email</button>
      </div>

      <!-- Email Verification -->
      <div id="signup-step-2" style="display:none">
        <p class="tfa-info">A 6-digit verification code has been sent to your email address. Please enter it below to
          verify your email address.</p>
        <div class="tfa-code-inputs">
          <input type="text" maxlength="1" class="tfa-digit" id="d1" oninput="tfaNext(this,'d2')">
          <input type="text" maxlength="1" class="tfa-digit" id="d2" oninput="tfaNext(this,'d3')">
          <input type="text" maxlength="1" class="tfa-digit" id="d3" oninput="tfaNext(this,'d4')">
          <input type="text" maxlength="1" class="tfa-digit" id="d4" oninput="tfaNext(this,'d5')">
          <input type="text" maxlength="1" class="tfa-digit" id="d5" oninput="tfaNext(this,'d6')">
          <input type="text" maxlength="1" class="tfa-digit" id="d6" oninput="tfaNext(this,null)">
        </div>
        <button class="btn-primary" onclick="verifyEmail()">Verify &amp; Complete Setup</button>
        <p style="text-align:center;margin-top:1rem;font-size:0.8rem;color:rgba(255,255,255,0.3);cursor:pointer"
          onclick="resendEmail()">Resend code</p>
      </div>
    </div>

  </div>

  <script>
    // ---- Demo user store (localStorage) ----
    function getUsers() {
      return JSON.parse(localStorage.getItem('rme_users') || '[]');
    }
    function saveUsers(u) {
      localStorage.setItem('rme_users', JSON.stringify(u));
    }
    // Pre-seed admin
    if (!localStorage.getItem('rme_admin_set')) {
      localStorage.setItem('rme_admin', JSON.stringify({ username: 'admin', password: 'RhemaAdmin2024!', role: 'admin' }));
      localStorage.setItem('rme_admin_set', '1');
    }

    function showPanel(p) {
      ['signin', 'signup'].forEach(id => {
        const el = document.getElementById('panel-' + id);
        if (el) el.style.display = 'none';
      });
      document.getElementById('panel-' + p).style.display = 'block';
      // Update tabs in visible panel
      document.querySelectorAll('.auth-tab').forEach(t => {
        t.classList.remove('active');
      });
    }

    function showAlert(id, msg, type) {
      const el = document.getElementById(id);
      if (!el) return;
      el.textContent = msg;
      el.className = 'alert ' + type + ' show';
      setTimeout(() => el.classList.remove('show'), 4000);
    }

    function handleSignin() {
      const user = document.getElementById('signin-user').value.trim();
      const pass = document.getElementById('signin-pass').value;
      if (!user || !pass) { showAlert('alert-signin', 'Please fill in all fields.', 'error'); return; }

      // Check admin
      const admin = JSON.parse(localStorage.getItem('rme_admin') || '{}');
      if ((user === admin.username || user === 'admin@rhemaministriesembassy.org') && pass === admin.password) {
        localStorage.setItem('rme_session', JSON.stringify({ username: admin.username, role: 'admin', name: 'Administrator' }));
        window.location.href = 'home.html';
        return;
      }

      const users = getUsers();
      const found = users.find(u => (u.username === user || u.email === user) && u.password === pass);
      if (!found) { showAlert('alert-signin', 'Invalid username or password.', 'error'); return; }

      // Direct Login (No 2FA)
      localStorage.setItem('rme_session', JSON.stringify({ username: found.username, role: found.role, name: found.name }));
      window.location.href = 'home.html';
    }

    function handleSignup() {
      const name = document.getElementById('su-name').value.trim();
      const email = document.getElementById('su-email').value.trim();
      const username = document.getElementById('su-username').value.trim();
      const pass = document.getElementById('su-pass').value;
      const pass2 = document.getElementById('su-pass2').value;
      const terms = document.getElementById('su-terms').checked;

      if (!name || !email || !username || !pass || !pass2) { showAlert('alert-signup', 'Please fill in all fields.', 'error'); return; }
      if (pass.length < 8) { showAlert('alert-signup', 'Password must be at least 8 characters.', 'error'); return; }
      if (pass !== pass2) { showAlert('alert-signup', 'Passwords do not match.', 'error'); return; }
      if (!terms) { showAlert('alert-signup', 'Please accept the Terms of Service.', 'error'); return; }

      const users = getUsers();
      if (users.find(u => u.username === username)) { showAlert('alert-signup', 'Username already taken.', 'error'); return; }
      if (users.find(u => u.email === email)) { showAlert('alert-signup', 'Email already registered.', 'error'); return; }

      // Store pending registration
      localStorage.setItem('rme_pending_signup', JSON.stringify({ name, email, username, password: pass, role: 'user', verified: true }));
      document.getElementById('signup-step-1').style.display = 'none';
      document.getElementById('signup-step-2').style.display = 'block';
      showAlert('alert-signup', 'Verification code sent! (Demo: use 123456)', 'success');
    }

    function verifyEmail() {
      const code = ['d1', 'd2', 'd3', 'd4', 'd5', 'd6'].map(id => document.getElementById(id).value).join('');
      if (code.length < 6) { showAlert('alert-signup', 'Please enter the full 6-digit code.', 'error'); return; }
      // Demo: accept 123456
      if (code !== '123456') { showAlert('alert-signup', 'Invalid code. Try again.', 'error'); return; }

      const pending = JSON.parse(localStorage.getItem('rme_pending_signup') || 'null');
      if (!pending) return;
      const users = getUsers();
      users.push(pending);
      saveUsers(users);
      localStorage.removeItem('rme_pending_signup');
      localStorage.setItem('rme_session', JSON.stringify({ username: pending.username, role: pending.role, name: pending.name }));
      window.location.href = 'home.html';
    }

    function socialLogin(provider) {
      // Demo: auto-login as guest
      const guestUser = { username: 'guest_' + Date.now(), role: 'user', name: 'Guest User', email: provider + '@demo.com' };
      const users = getUsers();
      users.push({ ...guestUser, password: '', verified: true });
      saveUsers(users);
      localStorage.setItem('rme_session', JSON.stringify(guestUser));
      window.location.href = 'home.html';
    }

    function showForgot() {
      const user = document.getElementById('signin-user').value.trim();
      if (!user) { showAlert('alert-signin', 'Enter your email first, then click forgot password.', 'error'); return; }
      showAlert('alert-signin', 'Password reset link sent to your email. (Demo only)', 'success');
    }

    function tfaNext(el, nextId) {
      if (el.value && nextId) document.getElementById(nextId).focus();
    }

    function resendEmail() {
      showAlert('alert-signup', 'Code resent! (Demo: use 123456)', 'success');
    }

    // If already logged in, redirect
    if (localStorage.getItem('rme_session')) {
      window.location.href = 'home.html';
    }
  </script>
</body>

</html>
